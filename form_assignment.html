<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./css/form_assignment.css">
</head>
<body>
    <main>
   <header><p>Employment Separation Form</p></header>
   <form>
   <div class="form-row">
    <div class="form-group">
    <label for="firstName"><b>First Name</b></label><br>
    <input type="text" id="firstName" name="firstName">
    <p style="font-size: 15px;">First Name</p>
     </div>
  <div class="form-group">
    <label for="firstName"></label><br>
    <input type="text" id="lastName" name="lastName">
     <p style="font-size: 15px;">Last Name</p>
  </div>
</div>
<div></div>
<div></div>
<div class="Employee">
    <label>Employee ID</label><br>
    <input type="text" name="employeeId"><br>
     <label>Personal Email</label><br>
    <input type="email" name="email">
</div> 
    <div class="Last-working">
        <label>Last Working Date</label><br>
    <input type="text" placeholder="dd-MMM-yyyy">
     <p style="font-size: 15px;">dd-mm-yy</p>
    </div>
    <div class="reason">
    <label>Reason for Departure</label><br>
    <input type="text" name="reason">
    </div>
    <div class="select">
    <label>Return of All Company Property</label><br>
    <div class="choose">
        <input type="radio" value="Yes">
        <p>Yes</p>
    </div>
    <div class="choose">
        <input type="radio" value="Yes">
        <p>No</p>
    </div>
     <div class="choose">
        <input type="radio" value="Yes">
        <p>Other</p>
    </div>
    </div>
    <label>Exit Interview Schedule</label><br>
    <input type="text" placeholder="">
     <p style="font-size: 15px;">dd-MMM-yyyy HH:MM AM/PM</p>
     <div class="comment">
    <label>Comments/Feedback</label><br>
    <textarea rows="4"></textarea>
     </div>
     <div class="save">
        <button type="submit">Submit</button>
     </div>
    
  </form>
   </main>
  
</body>
</html>
